[storage]
engine = icloud
# Mackup will sync to:
# ~/Library/Mobile Documents/com~apple~CloudDocs/Mackup/

[applications_to_ignore]
# SSH keys and agent config — too sensitive to sync via iCloud
ssh
# 1Password manages its own sync
1password
# GPG keys — manage separately
gpg
# Avoid syncing shell history (can be very large / contain secrets)
bash
